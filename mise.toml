[tools]
go = "1.26.1"
golangci-lint = "2.11.4"
goreleaser = "2.14.3"
trivy = "0.69.2"
yq = "4.52.5"

[settings]
lockfile = true
auto_install = true
experimental = true
task_output = "quiet"

[env]
CRUN_VERSION = "1.27"

[tasks.gogen]
description = "Runs go generate for all files"
run = "go generate ./..."

[tasks.secu-scan]
description = "Runs trivy security checks (vulnerability, secret leaks, miss-configs)"
run = "trivy fs . --scanners vuln,secret"

[tasks.test]
env = { "CGO_ENABLED" = "0" }
description = "Run tests"
run = "go test -tags containers_image_openpgp ./... -cover"

[tasks.lint]
env = { "GOOS" = "linux" }
description = "Lint golang and protobuf code"
run = ["golangci-lint run --config .golangci-lint.yml --fix"]

[tasks.download-crun]
description = "Download static crun binaries into embed/"
run = "hack/download-crun.sh"

[tasks.build]
description = "Build a local binaries"
depends = ["download-crun"]
run = """
export DOCKER_API_VERSION=$(yq '.info.version' api/swagger.yaml)
goreleaser build --clean --snapshot
"""

[tasks.dev]
description = "Run kogia daemon locally for testing (state in bin/.kogia-dev/)"
depends = ["build"]
run = """
ARCH=$(uname -m)
case "$ARCH" in
  x86_64)  GOARCH=amd64 ;;
  aarch64|arm64) GOARCH=arm64 ;;
  *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
esac
BINARY="bin/kogia-linux-${GOARCH}"
if [ ! -f "$BINARY" ]; then
  echo "error: $BINARY not found (did 'mise run build' succeed?)" >&2
  exit 1
fi
mkdir -p bin/.kogia-dev/run
exec "$BINARY" daemon \
  --root bin/.kogia-dev/data \
  --socket bin/.kogia-dev/run/kogia.sock \
  --log-level debug
"""

[tasks.release-snapshot]
description = "Build a snapshot release with goreleaser"
run = """
export DOCKER_API_VERSION=$(yq '.info.version' api/swagger.yaml)
goreleaser release --snapshot --clean
"""

[tasks.release-check]
description = "Check goreleaser configuration"
run = "goreleaser check"
